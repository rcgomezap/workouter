name: API Test CI

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    # Tell GitHub all commands happen inside the api folder
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # Speeds up future runs

      - name: Setup
        run: make install

      - name: Run Tests
        run: make test

      - name: Run Type Check
        run: make type-check
