name: CLI CI

on:
  push:
    branches: ["main"]
    paths:
      - "cli/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli-ci.yml"

jobs:
  cli-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make install

      - name: Run lint
        run: make lint

      - name: Run type check
        run: make type-check

      - name: Run tests with coverage
        run: make test-cov
