name: API Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test API before Docker build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup and test
        run: |
          make install
          make test
          make type-check

  docker-build-push:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "This workflow publishes Docker images only for v* tags"
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag matches shared version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cli_version=$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("cli/src/workouter_cli/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', content)
          if not match:
              raise SystemExit("Could not parse __version__ from cli/src/workouter_cli/version.py")
          print(match.group(1))
          PY
          )

          if [ "${tag_version}" != "${cli_version}" ]; then
            echo "Tag version (v${tag_version}) does not match CLI version (${cli_version})"
            exit 1
          fi

          api_version=$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("api/src/app/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', content)
          if not match:
              raise SystemExit("Could not parse __version__ from api/src/app/version.py")
          print(match.group(1))
          PY
          )

          if [ "${tag_version}" != "${api_version}" ]; then
            echo "Tag version (v${tag_version}) does not match API version (${api_version})"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/workouter-api:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/workouter-api:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
