name: CLI Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build binary for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: workouter-cli-linux-x86_64
            artifact_path: cli/dist/workouter-cli
            build_target: binary-linux-nuitka
            smoke_command: ./dist/workouter-cli --version
          - os: macos-latest
            artifact_name: workouter-cli-macos-arm64
            artifact_path: cli/dist/workouter-cli
            build_target: binary
            smoke_command: ./dist/workouter-cli --version
          - os: windows-latest
            artifact_name: workouter-cli-windows-x86_64.exe
            artifact_path: cli/dist/workouter-cli.exe
            build_target: binary
            smoke_command: ./dist/workouter-cli.exe --version

    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: make install

      - name: Build binary
        run: make ${{ matrix.build_target }}

      - name: Smoke test (Version)
        shell: bash
        run: |
          version_output=$(${{ matrix.smoke_command }})

          if [ -z "$version_output" ]; then
            echo "Binary produced empty --version output"
            exit 1
          fi

          echo "$version_output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp artifacts/workouter-cli-linux-x86_64/workouter-cli release-assets/workouter-cli-linux-x86_64
          cp artifacts/workouter-cli-macos-arm64/workouter-cli release-assets/workouter-cli-macos-arm64
          cp artifacts/workouter-cli-windows-x86_64.exe/workouter-cli.exe release-assets/workouter-cli-windows-x86_64.exe

      - name: Validate tag matches CLI version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cli_version=$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("cli/src/workouter_cli/version.py").read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', content)
          if not match:
              raise SystemExit("Could not parse __version__ from cli/src/workouter_cli/version.py")
          print(match.group(1))
          PY
          )

          if [ "$tag_version" != "$cli_version" ]; then
            echo "Tag version (v$tag_version) does not match CLI version ($cli_version)"
            exit 1
          fi

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*
